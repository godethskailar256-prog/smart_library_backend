<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand" dir="ltr">Smart Library</div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="btn" dir="ltr">Home</a>
        </div>
    </nav>

    <main class="center-container">
        <div class="card">
            <h2 dir="ltr">Librarian Access</h2>
            {% if error %}
                <p class="error-msg" dir="ltr">{{ error }}</p>
            {% endif %}
            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label for="full_name">الاسم الرباعي (Full Name)</label>
                    <input type="text" id="full_name" name="full_name" required>
                </div>
                <div class="form-group">
                    <label for="national_id">الرقم القومي (National ID)</label>
                    <input type="text" id="national_id" name="national_id" required>
                </div>
                <button type="submit" class="btn btn-block" dir="ltr">Login</button>
            </form>
        </div>
    </main>
</body>
</html>
